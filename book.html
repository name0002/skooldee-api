<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="robots" content="noindex"/>
<title>จองคลาส · skooldee</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --teal:#009488; --teal-soft:#d6f0ec; --teal-dk:#0a7a70;
    --orange:#F97316; --orange-soft:#FFEDD5;
    --ink:#1a2b29; --ink-2:#4b6360; --ink-3:#8aa49e;
    --line:#e5ecea; --bg:#f0f5f4; --white:#fff;
    --radius:16px; --radius-sm:10px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Instrument Sans','Sarabun',sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:500px; margin:0 auto; }

  .hdr{ background:linear-gradient(140deg,#0a7a70,var(--teal) 55%,#11a393); color:#fff; padding:28px 22px 32px; border-radius:0 0 28px 28px; text-align:center; }
  .hdr-logo{ width:72px; height:72px; object-fit:contain; border-radius:14px; display:block; margin:0 auto 10px; background:#fff; }
  .hdr-av{ width:72px; height:72px; background:rgba(255,255,255,.22); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; margin:0 auto 10px; }
  .hdr-school{ font-size:20px; font-weight:800; margin-bottom:3px; }
  .hdr-sub{ font-size:13px; opacity:.85; }
  .hdr-badge{ display:inline-block; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3); border-radius:99px; padding:3px 14px; font-size:12px; margin-top:10px; }

  .sec-title{ font-size:14px; font-weight:700; color:var(--ink-2); margin:20px 16px 10px; }

  .scard{ background:var(--white); border-radius:var(--radius); padding:16px 18px; margin:0 14px 12px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .scard.full{ opacity:.62; }
  .scard-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .kind-badge{ display:inline-block; font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:99px; }
  .kind-group{ background:var(--teal-soft); color:var(--teal-dk); }
  .kind-private{ background:#ede9fe; color:#6d28d9; }
  .kind-makeup{ background:var(--orange-soft); color:#c2410c; }
  .kind-trial{ background:#dcfce7; color:#15803d; }
  .scard-title{ font-size:16px; font-weight:700; margin:8px 0 2px; }
  .scard-meta{ font-size:13.5px; color:var(--ink-2); line-height:1.7; margin-top:6px; }
  .scard-meta .ic{ display:inline-block; width:18px; }
  .seats{ font-size:12.5px; font-weight:600; margin-top:8px; }
  .seats.ok{ color:var(--teal-dk); }
  .seats.low{ color:#c2410c; }
  .seats.none{ color:#b91c1c; }
  .fee{ font-size:13.5px; font-weight:700; color:var(--orange); }

  .btn{ display:inline-block; width:100%; margin-top:12px; padding:12px; background:var(--teal); color:#fff; font-family:inherit;
    font-size:15px; font-weight:700; border:none; border-radius:var(--radius-sm); cursor:pointer; transition:opacity .15s; }
  .btn:hover{ opacity:.9; }
  .btn:disabled{ background:#cbd5d3; cursor:not-allowed; }

  /* prospect form (revealed on tap) */
  .pf{ margin-top:12px; border-top:1px dashed var(--line); padding-top:12px; }
  .pf .field{ margin-bottom:10px; }
  .pf label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:5px; color:var(--ink-2); }
  .pf label span{ color:#e53e3e; }
  .pf input{ width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:var(--radius-sm); font-family:inherit; font-size:15px; outline:none; }
  .pf input:focus{ border-color:var(--teal); }
  .err{ display:none; background:#fee2e2; color:#991b1b; border-radius:8px; padding:9px 12px; font-size:13px; margin-top:8px; }

  .state{ text-align:center; padding:50px 24px; color:var(--ink-3); }
  .state .big{ font-size:52px; margin-bottom:14px; }
  .state h2{ font-size:19px; font-weight:700; color:var(--ink); margin-bottom:8px; }
  .state p{ font-size:14px; line-height:1.6; }

  .success{ background:var(--white); border-radius:var(--radius); padding:32px 24px; margin:24px 14px 0; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .success .icon{ font-size:52px; margin-bottom:16px; }
  .success h2{ font-size:20px; font-weight:800; margin-bottom:8px; }
  .success p{ font-size:14px; color:var(--ink-2); line-height:1.7; }
  .success .detail{ background:var(--bg); border-radius:12px; padding:14px; margin:16px 0; font-size:14px; text-align:left; line-height:1.9; }

  .skel{ height:108px; border-radius:var(--radius); background:linear-gradient(90deg,#edf2f1,#f5f7f6,#edf2f1);
    background-size:200% 100%; animation:sh 1.3s infinite; margin:0 14px 12px; }
  @keyframes sh{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .foot{ text-align:center; font-size:12px; color:var(--ink-3); padding:24px 16px 40px; }
  .foot a{ color:var(--teal); text-decoration:none; }

  /* "my bookings" section */
  .mcard{ background:var(--white); border-radius:var(--radius); padding:14px 18px; margin:0 14px 10px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .mcard-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .mcard-title{ font-size:14.5px; font-weight:700; }
  .mcard-meta{ font-size:13px; color:var(--ink-2); margin-top:4px; line-height:1.6; }
  .mstatus{ font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:99px; white-space:nowrap; }
  .mstatus.booked{ background:var(--teal-soft); color:var(--teal-dk); }
  .mstatus.attended{ background:#dcfce7; color:#15803d; }
  .mstatus.no_show{ background:#fee2e2; color:#991b1b; }
  .mstatus.cancelled{ background:#f1f3f2; color:var(--ink-3); }
  .mstatus.pending{ background:var(--orange-soft); color:#b45309; }
  .mstatus.approved{ background:#dcfce7; color:#15803d; }
  .mstatus.rejected{ background:#fee2e2; color:#991b1b; }

  /* recurring weekly classes */
  .wk-card{ padding:6px 0; }
  .wk-row{ display:flex; align-items:center; gap:12px; padding:11px 18px; border-bottom:1px solid var(--line); }
  .wk-row:last-child{ border-bottom:none; }
  .wk-day{ flex:0 0 auto; min-width:62px; text-align:center; background:var(--teal-soft); color:var(--teal-dk);
    font-size:13px; font-weight:700; padding:6px 4px; border-radius:10px; }
  .wk-info{ flex:1; min-width:0; }
  .wk-time{ font-size:14px; font-weight:600; }
  .wk-sub{ font-size:12.5px; color:var(--ink-2); margin-top:2px; }

  /* makeup request form */
  .mk-form label{ display:block; font-size:12.5px; font-weight:600; margin:8px 0 5px; color:var(--ink-2); }
  .mk-form select{ width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:var(--radius-sm);
    font-family:inherit; font-size:15px; outline:none; background:#fff; margin-bottom:0; }
  .mk-form input{ margin-bottom:0; }
  .mk-form select:focus{ border-color:var(--teal); }
  .btn-outline{ display:inline-block; width:100%; margin-top:10px; padding:10px; background:transparent;
    color:#b91c1c; font-family:inherit; font-size:13.5px; font-weight:700; border:1.5px solid #fca5a5; border-radius:var(--radius-sm); cursor:pointer; }
  .btn-outline:hover{ background:#fef2f2; }
  .mlink{ display:block; text-align:center; font-size:13px; color:var(--teal-dk); font-weight:600; margin:14px 14px 2px; cursor:pointer; }
  .pf-inline{ margin:8px 14px 14px; background:var(--white); border-radius:var(--radius); padding:14px 16px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .pf-inline input{ width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:var(--radius-sm); font-family:inherit; font-size:15px; outline:none; margin-bottom:8px; }
  .pf-inline input:focus{ border-color:var(--teal); }
</style>
</head>
<body>
<div id="root" class="wrap">
  <div class="hdr"><div class="hdr-av">⏳</div><div class="hdr-school">กำลังโหลด…</div></div>
  <div class="skel"></div><div class="skel"></div>
</div>

<script>
var API_BASE = 'https://skooldee-api-production.up.railway.app';

function qp(k){ return new URLSearchParams(location.search).get(k); }
var TOKEN = qp('token') || '';
var SLUG  = qp('school') || qp('slug') || '';

var DATA = null; // { school, school_logo, student, sessions }
var MY_KEY = 'skd_mybooking_' + (SLUG || 'token'); // prospect identity, scoped per school link

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function root(html){ document.getElementById('root').innerHTML = html; }

function showError(msg){
  root('<div class="hdr"><div class="hdr-av">🔍</div><div class="hdr-school">ไม่พบลิงก์</div></div>'
    +'<div class="state"><div class="big">😕</div><h2>ลิงก์ไม่ถูกต้อง</h2><p>'+esc(msg||'กรุณาขอลิงก์จองคลาสจากทางโรงเรียนอีกครั้งค่ะ')+'</p></div>'
    +'<div class="foot">ขับเคลื่อนโดย <a href="https://skooldee.com">skooldee</a></div>');
}

function hdr(d){
  var logo = d.school_logo
    ? '<img class="hdr-logo" src="'+esc(d.school_logo)+'" alt="โลโก้"/>'
    : '<div class="hdr-av">'+esc((d.school||'S')[0].toUpperCase())+'</div>';
  var who = d.student ? ('สวัสดีค่ะ '+esc(d.student.nickname||d.student.name)) : 'เลือกคลาสที่ต้องการจอง';
  return '<div class="hdr">'+logo
    +'<div class="hdr-school">'+esc(d.school||'โรงเรียน')+'</div>'
    +'<div class="hdr-sub">'+who+'</div>'
    +'<div class="hdr-badge">📅 จองคลาสเรียน</div></div>';
}

function fmtDate(iso){
  // 2026-06-28 → 28 มิ.ย. 2569
  var M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var p=String(iso||'').split('-'); if(p.length!==3) return iso||'';
  return parseInt(p[2])+' '+M[parseInt(p[1])-1]+' '+(parseInt(p[0])+543);
}

function saveProspectIdentity(phone){ try{ localStorage.setItem(MY_KEY, JSON.stringify({phone:phone})); }catch(e){} }
function getProspectIdentity(){ try{ var v=localStorage.getItem(MY_KEY); return v?JSON.parse(v):null; }catch(e){ return null; } }

function mineStatusLabel(st){ return {booked:'จองแล้ว', attended:'มาเรียนแล้ว', no_show:'ไม่มาเรียน', cancelled:'ยกเลิกแล้ว'}[st]||st; }

function mineCard(b){
  var canCancel = b.status==='booked' && b.date >= todayStr();
  return '<div class="mcard" id="mcard-'+b.id+'">'
    + '<div class="mcard-top"><span class="mcard-title">'+esc(b.title||b.kind_label)+'</span>'
    + '<span class="mstatus '+esc(b.status)+'">'+esc(mineStatusLabel(b.status))+'</span></div>'
    + '<div class="mcard-meta">📅 '+esc(b.day)+' '+fmtDate(b.date)+' · 🕐 '+esc(b.start)+'–'+esc(b.end)+' น.'
    + (b.teacher?(' · 👩‍🏫 '+esc(b.teacher)):'')+'</div>'
    + '<div class="err" id="merr-'+b.id+'"></div>'
    + (canCancel ? '<button class="btn-outline" onclick="cancelBooking('+b.id+')">ยกเลิกการจองนี้</button>' : '')
    + '</div>';
}

function todayStr(){ return new Date().toISOString().slice(0,10); }

function renderMineInto(list){
  var wrap = document.getElementById('mine-wrap');
  if(!wrap) return;
  if(!list || !list.length){
    // prospect: offer the lookup form again (e.g. just cancelled their only booking)
    // existing student: nothing to say, just leave it empty
    if(!TOKEN) renderLookupPrompt(); else wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = '<div class="sec-title">การจองของฉัน</div>' + list.map(mineCard).join('');
}

function loadMine(){
  var url;
  if(TOKEN) url = API_BASE+'/api/public/book/mine?token='+encodeURIComponent(TOKEN);
  else {
    var idy = getProspectIdentity();
    if(!idy || !idy.phone) { renderLookupPrompt(); return; }
    url = API_BASE+'/api/public/book/mine?slug='+encodeURIComponent(SLUG)+'&phone='+encodeURIComponent(idy.phone);
  }
  fetch(url).then(function(r){ return r.json(); }).then(function(j){
    renderMineInto((j&&j.bookings)||[]);
  }).catch(function(){ /* silent — non-critical section */ });
}

// prospects with no saved identity (new device / cleared storage) can look themselves up by phone
function renderLookupPrompt(){
  var wrap = document.getElementById('mine-wrap');
  if(!wrap) return;
  wrap.innerHTML = '<div class="mlink" onclick="toggleLookup()">เคยจองไว้แล้ว? ตรวจสอบการจองของฉัน</div>';
}
function toggleLookup(){
  var wrap = document.getElementById('mine-wrap');
  wrap.innerHTML = '<div class="pf-inline">'
    + '<input id="lookup-phone" type="tel" placeholder="กรอกเบอร์โทรที่ใช้จอง" maxlength="20"/>'
    + '<button class="btn" onclick="doLookup()">ตรวจสอบ</button>'
    + '<div class="err" id="lookup-err"></div>'
    + '</div>';
}
function doLookup(){
  var phone=(document.getElementById('lookup-phone')||{}).value||'';
  phone = phone.trim();
  var errEl = document.getElementById('lookup-err');
  if(!phone){ if(errEl){errEl.textContent='กรุณากรอกเบอร์โทร'; errEl.style.display='block';} return; }
  fetch(API_BASE+'/api/public/book/mine?slug='+encodeURIComponent(SLUG)+'&phone='+encodeURIComponent(phone))
    .then(function(r){ return r.json(); })
    .then(function(j){
      var list=(j&&j.bookings)||[];
      if(!list.length){ if(errEl){errEl.textContent='ไม่พบการจองสำหรับเบอร์นี้'; errEl.style.display='block';} return; }
      saveProspectIdentity(phone);
      renderMineInto(list);
    })
    .catch(function(){ if(errEl){errEl.textContent='เกิดข้อผิดพลาด ลองใหม่อีกครั้ง'; errEl.style.display='block';} });
}

function cancelBooking(id){
  if(!confirm('ยืนยันยกเลิกการจองนี้?')) return;
  var body={ booking_id:id };
  if(TOKEN) body.token=TOKEN; else { var idy=getProspectIdentity(); body.phone = idy&&idy.phone; }
  fetch(API_BASE+'/api/public/book/cancel',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error(j.error||'ยกเลิกไม่สำเร็จ'); return j; }); })
    .then(function(){ reloadSessions(); }) // re-fetches list + mine section together (render() calls loadMine())
    .catch(function(err){
      var e=document.getElementById('merr-'+id);
      if(e){ e.textContent=err.message; e.style.display='block'; } else { alert(err.message||'ยกเลิกไม่สำเร็จ'); }
    });
}

// re-fetch the open-sessions list (seats may have changed after a cancel)
function reloadSessions(){
  var url = API_BASE+'/api/public/book?'+(TOKEN?('token='+encodeURIComponent(TOKEN)):('slug='+encodeURIComponent(SLUG)));
  fetch(url).then(function(r){ return r.json(); }).then(render).catch(function(){});
}

// ---- recurring weekly classes + make-up requests (token / existing student only) ----
function val(id){ var el=document.getElementById(id); return el?String(el.value||'').trim():''; }
function timeToMin(s){ var p=String(s||'').split(':'); return p.length>=2 ? (parseInt(p[0],10)*60+parseInt(p[1],10)) : NaN; }

function weeklyCard(schedule){
  if(!schedule || !schedule.length) return '';
  var rows = schedule.map(function(s){
    var sub = s.category_label || s.title || '';
    return '<div class="wk-row">'
      + '<span class="wk-day">'+esc(s.day)+'</span>'
      + '<div class="wk-info">'
      + '<div class="wk-time">🕐 '+esc(s.start)+'–'+esc(s.end)+' น.</div>'
      + (sub || s.teacher ? '<div class="wk-sub">'+esc(sub)+(s.teacher?(sub?' · ':'')+'👩‍🏫 '+esc(s.teacher):'')+'</div>' : '')
      + '</div></div>';
  }).join('');
  return '<div class="sec-title">📅 คลาสประจำสัปดาห์ของฉัน</div><div class="scard wk-card">'+rows+'</div>';
}

function makeupStatusLabel(st){ return {pending:'รออนุมัติ', approved:'อนุมัติแล้ว', rejected:'ไม่อนุมัติ', cancelled:'ยกเลิกแล้ว'}[st]||st; }
function makeupReqCard(m){
  var canCancel = m.status==='pending';
  return '<div class="mcard" id="mkcard-'+m.id+'">'
    + '<div class="mcard-top"><span class="mcard-title">'+esc(m.category_label||'เรียนชดเชย')+'</span>'
    + '<span class="mstatus '+esc(m.status)+'">'+esc(makeupStatusLabel(m.status))+'</span></div>'
    + '<div class="mcard-meta">📅 '+esc(m.day)+' '+fmtDate(m.date)+' · 🕐 '+esc(m.start)+'–'+esc(m.end)+' น.</div>'
    + (m.status==='rejected' && m.review_note ? '<div class="mcard-meta" style="color:#b91c1c">หมายเหตุ: '+esc(m.review_note)+'</div>' : '')
    + '<div class="err" id="mkerr-'+m.id+'"></div>'
    + (canCancel ? '<button class="btn-outline" onclick="cancelMakeup('+m.id+')">ยกเลิกคำขอนี้</button>' : '')
    + '</div>';
}

// the student-only block: weekly schedule + "request a makeup" button + my makeup requests
function studentBlock(d){
  if(!d || !d.student) return '';
  var reqs = d.makeup_requests || [];
  var reqHtml = reqs.length
    ? '<div class="sec-title">คำขอเรียนชดเชยของฉัน</div>' + reqs.map(makeupReqCard).join('')
    : '';
  return weeklyCard(d.schedule)
    + '<div class="sec-title">เรียนชดเชย</div>'
    + '<div style="margin:0 14px 4px"><button class="btn" id="makeup-open-btn" onclick="openMakeupForm()">📌 แจ้งจองวันชดเชย</button></div>'
    + '<div id="makeup-form-wrap"></div>'
    + reqHtml;
}

function openMakeupForm(){
  var d = DATA || {};
  var subjOpts = (d.subjects||[]).map(function(s){ return '<option value="'+esc(s.key||'')+'">'+esc(s.label)+'</option>'; }).join('');
  var wrap = document.getElementById('makeup-form-wrap');
  if(!wrap) return;
  wrap.innerHTML = '<div class="pf-inline mk-form">'
    + (subjOpts ? '<label>วิชา</label><select id="mk-subj">'+subjOpts+'</select>' : '')
    + '<label>วันที่ต้องการเรียนชดเชย</label><input id="mk-date" type="date" min="'+todayStr()+'"/>'
    + '<div style="display:flex;gap:10px">'
    +   '<div style="flex:1"><label>เวลาเริ่ม</label><input id="mk-start" type="time"/></div>'
    +   '<div style="flex:1"><label>ถึงเวลา</label><input id="mk-end" type="time"/></div>'
    + '</div>'
    + '<label>หมายเหตุ (เช่น ขาดเรียนคลาสวันไหน)</label><input id="mk-reason" placeholder="ไม่บังคับ" maxlength="300"/>'
    + '<div class="err" id="mk-err"></div>'
    + '<button class="btn" onclick="submitMakeup()">ส่งคำขอ ✅</button>'
    + '<button class="btn-outline" style="color:var(--ink-2);border-color:var(--line)" onclick="closeMakeupForm()">ยกเลิก</button>'
    + '</div>';
  var btn = document.getElementById('makeup-open-btn'); if(btn) btn.style.display='none';
}
function closeMakeupForm(){
  var wrap = document.getElementById('makeup-form-wrap'); if(wrap) wrap.innerHTML='';
  var btn = document.getElementById('makeup-open-btn'); if(btn) btn.style.display='';
}
function submitMakeup(){
  var err = document.getElementById('mk-err');
  function fail(m){ if(err){ err.textContent=m; err.style.display='block'; } }
  var date=val('mk-date'), start=val('mk-start'), end=val('mk-end');
  if(!date) return fail('กรุณาเลือกวันที่');
  if(!start || !end) return fail('กรุณาเลือกเวลาเริ่มและเวลาสิ้นสุด');
  var sMin=timeToMin(start), eMin=timeToMin(end);
  if(isNaN(sMin)||isNaN(eMin)||eMin<=sMin) return fail('เวลาสิ้นสุดต้องอยู่หลังเวลาเริ่ม');
  var body={ token:TOKEN, date:date, start_min:sMin, end_min:eMin, category:val('mk-subj')||null, reason:val('mk-reason')||null };
  fetch(API_BASE+'/api/public/book/makeup-request',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error(j.error||'ส่งคำขอไม่สำเร็จ'); return j; }); })
    .then(function(){ reloadSessions(); window.scrollTo(0,0); })
    .catch(function(e){ fail(e.message||'เกิดข้อผิดพลาด'); });
}
function cancelMakeup(id){
  if(!confirm('ยกเลิกคำขอเรียนชดเชยนี้?')) return;
  fetch(API_BASE+'/api/public/book/makeup-request/cancel',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ token:TOKEN, request_id:id }) })
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error(j.error||'ยกเลิกไม่สำเร็จ'); return j; }); })
    .then(function(){ reloadSessions(); })
    .catch(function(e){ var el=document.getElementById('mkerr-'+id); if(el){ el.textContent=e.message; el.style.display='block'; } });
}
window.openMakeupForm=openMakeupForm; window.closeMakeupForm=closeMakeupForm;
window.submitMakeup=submitMakeup; window.cancelMakeup=cancelMakeup;

function sessionCard(s){
  var full = s.full || s.seats_left<=0;
  var seatCls = full?'none':(s.seats_left<=3?'low':'ok');
  var seatTxt = full?'❌ เต็มแล้ว':('ว่าง '+s.seats_left+' ที่');
  var meta =
      '<div class="scard-meta">'
    + '<div><span class="ic">📅</span>'+esc(s.day)+' '+fmtDate(s.date)+'</div>'
    + '<div><span class="ic">🕐</span>'+esc(s.start)+'–'+esc(s.end)+' น.</div>'
    + (s.teacher ? '<div><span class="ic">👩‍🏫</span>'+esc(s.teacher)+'</div>' : '')
    + (s.room ? '<div><span class="ic">🚪</span>'+esc(s.room)+'</div>' : '')
    + (s.fee!=null ? '<div><span class="ic">💰</span><span class="fee">'+Number(s.fee).toLocaleString()+' บาท</span></div>' : '')
    + '</div>';
  var btn = full
    ? '<button class="btn" disabled>เต็มแล้ว</button>'
    : '<button class="btn" id="bk-'+s.id+'" onclick="onBook('+s.id+')">จองคลาสนี้</button>';
  return '<div class="scard'+(full?' full':'')+'" id="card-'+s.id+'">'
    + '<div class="scard-top"><span class="kind-badge kind-'+esc(s.kind)+'">'+esc(s.kind_label)+'</span>'
    + '<span class="seats '+seatCls+'">'+seatTxt+'</span></div>'
    + '<div class="scard-title">'+esc(s.title||s.kind_label)+(s.category?' · '+esc(s.category):'')+'</div>'
    + meta
    + '<div class="err" id="err-'+s.id+'"></div>'
    + '<div id="slot-'+s.id+'">'+btn+'</div>'
    + '</div>';
}

function render(d){
  DATA = d;
  document.title = 'จองคลาส · '+esc(d.school||'skooldee');
  if(!d.sessions || !d.sessions.length){
    root(hdr(d)
      +'<div id="mine-wrap"></div>'
      + studentBlock(d)
      + (d.student
          ? '' // an existing student still has their schedule + makeup section above
          : '<div class="state"><div class="big">🗓️</div><h2>ยังไม่มีคลาสให้จอง</h2><p>ขณะนี้ยังไม่มีคลาสที่เปิดให้จอง<br/>กรุณากลับมาตรวจสอบใหม่ภายหลังค่ะ</p></div>')
      +'<div class="foot">ขับเคลื่อนโดย <a href="https://skooldee.com">skooldee</a></div>');
    loadMine();
    return;
  }
  var cards = d.sessions.map(sessionCard).join('');
  root(hdr(d)
    +'<div id="mine-wrap"></div>'
    + studentBlock(d)
    +'<div class="sec-title">คลาสที่เปิดให้จอง ('+d.sessions.length+')</div>'
    + cards
    +'<div class="foot">ขับเคลื่อนโดย <a href="https://skooldee.com">skooldee</a></div>');
  loadMine();
}

function showErr(id,msg){ var e=document.getElementById('err-'+id); if(e){ e.textContent=msg; e.style.display='block'; } }

// existing student → confirm + book directly. prospect → reveal a mini form first.
function onBook(id){
  var e=document.getElementById('err-'+id); if(e) e.style.display='none';
  if(DATA && DATA.student){
    if(!confirm('ยืนยันการจองคลาสนี้?')) return;
    doBook(id, {});
    return;
  }
  // prospect: reveal form
  document.getElementById('slot-'+id).innerHTML =
      '<div class="pf">'
    + '<div class="field"><label>ชื่อ-นามสกุล <span>*</span></label><input id="pf-name-'+id+'" placeholder="ชื่อผู้เรียน" maxlength="100"/></div>'
    + '<div class="field"><label>เบอร์โทร <span>*</span></label><input id="pf-phone-'+id+'" type="tel" placeholder="081-234-5678" maxlength="20"/></div>'
    + '<div class="field"><label>LINE ID (ถ้ามี)</label><input id="pf-line-'+id+'" placeholder="@lineid" maxlength="60"/></div>'
    + '<button class="btn" onclick="submitProspect('+id+')">ยืนยันการจอง ✅</button>'
    + '</div>';
}

function submitProspect(id){
  var name=(document.getElementById('pf-name-'+id)||{}).value||'';
  var phone=(document.getElementById('pf-phone-'+id)||{}).value||'';
  var line=(document.getElementById('pf-line-'+id)||{}).value||'';
  if(!name.trim()){ showErr(id,'กรุณากรอกชื่อ'); return; }
  if(!phone.trim()){ showErr(id,'กรุณากรอกเบอร์โทร'); return; }
  doBook(id, { name:name.trim(), phone:phone.trim(), line:line.trim() });
}

function doBook(id, extra){
  var body = { session_id:id };
  if(TOKEN) body.token=TOKEN; else body.slug=SLUG;
  if(extra.name) body.name=extra.name;
  if(extra.phone) body.phone=extra.phone;
  if(extra.line) body.line=extra.line;

  var slot=document.getElementById('slot-'+id);
  if(slot) slot.innerHTML='<button class="btn" disabled>กำลังจอง…</button>';

  fetch(API_BASE+'/api/public/book',{
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  })
  .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error(j.error||'จองไม่สำเร็จ'); return j; }); })
  .then(function(j){
    if(!TOKEN && extra.phone) saveProspectIdentity(extra.phone); // remember so "การจองของฉัน" works on return visits
    renderSuccess(j.session, j.booking_id);
  })
  .catch(function(err){
    showErr(id, err.message||'เกิดข้อผิดพลาด');
    render(DATA); // restore the list so they can retry / pick another
    setTimeout(function(){ showErr(id, err.message||'เกิดข้อผิดพลาด'); },0);
  });
}

function renderSuccess(s, bookingId){
  var d=DATA||{};
  var detail = s ? '<div class="detail">'
    + '<b>'+esc(s.title||s.kind_label||'คลาส')+'</b><br/>'
    + '📅 '+esc(s.day||'')+' '+fmtDate(s.date)+'<br/>'
    + '🕐 '+esc(s.start)+'–'+esc(s.end)+' น.'
    + (s.fee!=null?'<br/>💰 '+Number(s.fee).toLocaleString()+' บาท':'')
    + '</div>' : '';
  root(hdr(d)
    +'<div class="success"><div class="icon">🎉</div>'
    +'<h2>จองคลาสสำเร็จ!</h2>'
    +'<p>ทางโรงเรียนได้รับการจองของคุณแล้วค่ะ</p>'
    + detail
    + (bookingId
        ? '<button class="btn-outline" onclick="cancelBooking('+bookingId+')">ยกเลิกการจองนี้</button>'
        : '<p style="font-size:13px;color:var(--ink-3)">หากต้องการยกเลิก กรุณาติดต่อทางโรงเรียนโดยตรง</p>')
    +'</div>'
    +'<div class="mlink" onclick="reloadSessions()">‹ ดูคลาสอื่น / การจองของฉัน</div>'
    +'<div class="foot">ขับเคลื่อนโดย <a href="https://skooldee.com">skooldee</a></div>');
  window.scrollTo(0,0);
}

window.onBook=onBook; window.submitProspect=submitProspect;

// ---- boot ----
if(!TOKEN && !SLUG){ showError('ไม่พบ URL ของโรงเรียน'); }
else {
  var url = API_BASE+'/api/public/book?'+(TOKEN?('token='+encodeURIComponent(TOKEN)):('slug='+encodeURIComponent(SLUG)));
  fetch(url)
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(render)
    .catch(function(){ showError('ไม่พบข้อมูลการจอง'); });
}
</script>
</body>
</html>
